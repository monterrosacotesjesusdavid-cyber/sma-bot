<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMA Bot — Uniguajira</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e85d26;
    --accent2: #f5a623;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --green: #2ecc71;
    --red: #e74c3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,93,38,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,93,38,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,93,38,0.1);
    border: 1px solid rgba(232,93,38,0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header span {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28c840; }

  .card-body {
    padding: 28px 24px;
  }

  /* Form */
  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,93,38,0.1);
  }

  input::placeholder { color: #333344; }

  /* Button */
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn:hover { background: #d44f1e; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #333; cursor: not-allowed; color: var(--muted); }

  .btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }

  /* Console */
  .console {
    margin-top: 20px;
    background: #05050a;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: none;
  }

  .console.visible { display: block; }

  .console-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .console-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .console-body {
    padding: 16px;
    max-height: 280px;
    overflow-y: auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
  }

  .console-body::-webkit-scrollbar { width: 4px; }
  .console-body::-webkit-scrollbar-track { background: transparent; }
  .console-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line {
    opacity: 0;
    transform: translateX(-8px);
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .log-line.success { color: var(--green); }
  .log-line.error { color: var(--red); }
  .log-line.warn { color: var(--accent2); }
  .log-line.info { color: var(--text); }

  /* Status bar */
  .status-bar {
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .status-bar.visible { display: flex; }
  .status-bar.success { border-color: rgba(46,204,113,0.4); color: var(--green); }
  .status-bar.error { border-color: rgba(231,76,60,0.4); color: var(--red); }
  .status-bar.running { border-color: rgba(232,93,38,0.4); color: var(--accent); }

  .status-icon { font-size: 14px; }

  /* Footer */
  .footer {
    margin-top: 24px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #2a2a3a;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">bot activo</div>
    <h1>SMA<span>.</span><br>Login Bot</h1>
    <p class="subtitle">Universidad de la Guajira — Automatización de acceso</p>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span>credenciales</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Código estudiantil</label>
        <input type="text" id="username" placeholder="Ej: 2023115001" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off"/>
      </div>
      <button class="btn" id="runBtn" onclick="startBot()">
        <span class="btn-text">Ejecutar Login</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <div class="console" id="console">
    <div class="console-header">
      <span class="console-title">▸ output</span>
    </div>
    <div class="console-body" id="consoleBody"></div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-icon" id="statusIcon"></span>
    <span id="statusText"></span>
  </div>

  <div class="footer">SMA BOT v1.0 — UNIGUAJIRA</div>
</div>

<script>
function startBot() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    showStatus('error', '⚠', 'Ingresa código y contraseña');
    return;
  }

  const btn = document.getElementById('runBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  document.getElementById('consoleBody').innerHTML = '';
  document.getElementById('console').classList.add('visible');
  showStatus('running', '⟳', 'Bot ejecutándose...');

  fetch('/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  }).then(r => r.json()).then(data => {
    if (data.error) {
      showStatus('error', '✕', data.error);
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }
    streamLogs();
  }).catch(() => {
    showStatus('error', '✕', 'Error de conexión');
    btn.classList.remove('loading');
    btn.disabled = false;
  });
}

function streamLogs() {
  const source = new EventSource('/logs');
  const body = document.getElementById('consoleBody');

  source.onmessage = (e) => {
    const msg = e.data;
    if (msg === '__END__') {
      source.close();
      const btn = document.getElementById('runBtn');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    const line = document.createElement('div');
    line.className = 'log-line';

    if (msg.includes('✅') || msg.includes('🎉')) {
      line.classList.add('success');
      showStatus('success', '✓', 'Login completado');
    } else if (msg.includes('❌') || msg.includes('💥')) {
      line.classList.add('error');
      showStatus('error', '✕', 'Falló el login');
    } else if (msg.includes('⚠️')) {
      line.classList.add('warn');
    } else {
      line.classList.add('info');
    }

    line.textContent = msg;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  };
}

function showStatus(type, icon, text) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar visible ${type}`;
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusText').textContent = text;
}

// Enter key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startBot();
});
</script>
</body>
</html>
